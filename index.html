<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jarvis Emergency Control - HiveMQ Cloud</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    :root{--bg:#020712;--panel:#07111f;--panel2:#0b1b2d;--line:#163655;--text:#e5f8ff;--muted:#8fb5d3;--cyan:#38d7ff;--green:#32f087;--yellow:#ffd166;--red:#ff5c7a;--purple:#a78bfa}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,Arial,Helvetica,sans-serif;background:radial-gradient(circle at top left,#0d3457 0,#061120 38%,#02050d 100%);color:var(--text);min-height:100vh}.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.side{background:rgba(3,12,24,.9);border-right:1px solid var(--line);padding:24px;position:sticky;top:0;height:100vh}.brand{font-size:28px;font-weight:900;letter-spacing:1.5px;line-height:1;color:#9eeaff;text-shadow:0 0 22px rgba(56,215,255,.35)}.subtitle{font-size:12px;color:var(--muted);margin-top:10px;letter-spacing:.9px}.nav{margin-top:28px;display:grid;gap:10px}.nav button,.btn{border:1px solid #23527d;background:#081a2e;color:#e5f8ff;padding:13px 14px;border-radius:13px;text-align:left;font-weight:800;cursor:pointer}.nav button.active,.nav button:hover,.btn:hover{background:#0d2946;box-shadow:0 0 18px rgba(56,215,255,.16)}.device{margin-top:28px;padding:16px;border:1px solid var(--line);border-radius:16px;background:#071727}.main{padding:26px}.top{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--line);border-radius:18px;background:rgba(7,17,31,.86);padding:20px 22px;margin-bottom:20px}.top h1{margin:0;font-size:33px;letter-spacing:1px}.pill{border-radius:999px;padding:9px 14px;font-weight:900;border:1px solid #276449;background:#0b3a25;color:var(--green)}.pill.off{background:#351017;color:var(--red);border-color:#7c1e32}.pill.warn{background:#3a2f0b;color:var(--yellow);border-color:#8b6d1d}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.grid.two{grid-template-columns:1fr 1fr}.card{border:1px solid var(--line);border-radius:18px;background:rgba(7,17,31,.92);padding:18px;box-shadow:0 0 30px rgba(0,120,255,.07)}.card h3{margin:0 0 10px;font-size:15px;color:#ddf7ff}.muted{color:var(--muted);font-size:13px}.big{font-size:30px;font-weight:900;color:#9eeaff;text-shadow:0 0 15px rgba(56,215,255,.25)}.section-title{display:flex;align-items:center;justify-content:space-between;margin:18px 0 12px}.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.btn{text-align:center;min-height:56px}.btn.green{color:var(--green)}.btn.yellow{color:var(--yellow)}.btn.red{color:var(--red)}.btn.cyan{color:var(--cyan)}.btn.purple{color:var(--purple)}.btn:disabled{opacity:.45;cursor:not-allowed}.form{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field label{display:block;margin-bottom:6px;color:var(--muted);font-size:12px}.field input,.field select{width:100%;border:1px solid #24517a;background:#030b15;color:var(--text);border-radius:12px;padding:13px}.raw{white-space:pre-wrap;word-break:break-word;background:#020812;border:1px solid #14324f;border-radius:14px;padding:13px;color:#b9f6c9;max-height:420px;overflow:auto}.ok{color:var(--green)}.warning{color:var(--yellow)}.critical{color:var(--red)}.info{color:var(--cyan)}.feed-chip{display:inline-block;border:1px solid #16466f;border-radius:999px;padding:8px 10px;color:#bdeaff;background:#061625;font-size:12px;margin:4px}.toast{position:fixed;right:18px;bottom:18px;max-width:420px;z-index:99}.toast .card{margin-top:10px}.modal-bg{position:fixed;inset:0;background:rgba(2,8,18,.78);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:18px;z-index:999}.modal{width:min(560px,94vw);border:1px solid rgba(56,215,255,.25);background:linear-gradient(180deg,#071422,#040b14);border-radius:22px;box-shadow:0 30px 90px rgba(0,0,0,.62);overflow:hidden}.modal-head{padding:18px 20px;border-bottom:1px solid #14324f;font-weight:900;font-size:20px}.modal-body{padding:20px;color:#d8edf9}.modal-actions{padding:16px 20px 20px;display:flex;justify-content:flex-end;gap:12px;border-top:1px solid #14324f;flex-wrap:wrap}code{background:#071727;border:1px solid #14324f;border-radius:6px;padding:1px 6px;color:#bff4ff}.bar{height:12px;background:#0d2b42;border-radius:99px;overflow:hidden;margin:9px 0}.bar>div{height:100%;background:linear-gradient(90deg,#22c55e,#38d7ff);width:0}
    @media(max-width:1100px){.app{grid-template-columns:1fr}.side{height:auto;position:relative}.grid,.grid.two,.actions,.form{grid-template-columns:1fr}.top{align-items:flex-start;gap:12px;flex-direction:column}.top h1{font-size:25px}}
  </style>
</head>
<body>
<div id="root"></div>
<script>
const {useEffect,useMemo,useRef,useState}=React;
const DEFAULTS={host:'624e0fdb49dc4ab690dd02165a6ecefe.s1.eu.hivemq.cloud',port:'8884',path:'/mqtt',username:'antdev',password:'',topicPrefix:'jarvis',cmdAuth:'',offlineAfter:30,remember:false};
const DANGEROUS=new Set(['hard_reset','force_power_off','reboot_server','power_off','reset_wifi_config','wifi_reset']);
function safeJson(v){try{return typeof v==='string'?JSON.parse(v):v}catch(e){return v}}
function nowId(prefix='ui'){return prefix+'-'+Date.now()+'-'+Math.random().toString(16).slice(2,7)}
function uptimeText(sec){sec=Number(sec||0);const d=Math.floor(sec/86400),h=Math.floor(sec%86400/3600),m=Math.floor(sec%3600/60);return d?`${d}d ${h}h ${m}m`:h?`${h}h ${m}m`:`${m}m`}
function bytes(n){n=Number(n||0);if(!n)return '-';const u=['B','KB','MB','GB'];let i=0;while(n>=1024&&i<u.length-1){n/=1024;i++}return n.toFixed(i?2:0)+' '+u[i]}
function topicOf(cfg,resource){return `${cfg.topicPrefix}/${resource}`}
function wsUrl(cfg){return `wss://${cfg.host}:${cfg.port}${cfg.path||'/mqtt'}`}
function App(){
  const [tab,setTab]=useState('dashboard');
  const [cfg,setCfg]=useState(()=>({...DEFAULTS,...safeJson(localStorage.getItem('jarvis-hivemq-ui')||'{}')}));
  const [connected,setConnected]=useState(false);
  const [messages,setMessages]=useState([]);
  const [state,setState]=useState({status:null,heartbeat:null,telemetry:null,result:null,agent:null,alerts:null,audit:null,lastSeen:0});
  const [modal,setModal]=useState(null);
  const [toast,setToast]=useState(null);
  const clientRef=useRef(null);
  const currentCfg=useRef(cfg); currentCfg.current=cfg;
  const latest=state.heartbeat||state.status||{};
  const latestTs=state.lastSeen||0;
  const age=latestTs?Math.round((Date.now()-latestTs)/1000):999999;
  const online=connected && latestTs && age<=Number(cfg.offlineAfter||30) && latest.online!==false;
  const telemetry=state.telemetry||{};
  const agent=state.agent||{};
  function showToast(type,title,msg){setToast({type,title,msg});setTimeout(()=>setToast(null),4500)}
  function saveSettings(){
    if(cfg.remember)localStorage.setItem('jarvis-hivemq-ui',JSON.stringify(cfg));
    else localStorage.removeItem('jarvis-hivemq-ui');
    showToast('ok','Setting disimpan',cfg.remember?'Tersimpan di browser ini.':'Tidak disimpan permanen.');
    reconnect();
  }
  function clearSettings(){localStorage.removeItem('jarvis-hivemq-ui');setCfg(DEFAULTS);showToast('warning','Setting dihapus','Konfigurasi lokal browser sudah dihapus.')}
  function onIncoming(topic,payload){
    const text=new TextDecoder().decode(payload);
    const data=safeJson(text);
    setMessages(m=>[{ts:new Date().toLocaleTimeString(),topic,payload:text},...m].slice(0,80));
    const p=currentCfg.current.topicPrefix+'/';
    const res=topic.startsWith(p)?topic.slice(p.length):topic;
    setState(s=>{
      const n={...s};
      if(res==='heartbeat'||res==='status'){n[res]=data;n.lastSeen=Date.now()}
      else if(res==='telemetry')n.telemetry=data;
      else if(res==='result')n.result=data;
      else if(res==='agent')n.agent=data;
      else if(res==='alerts')n.alerts=data;
      else if(res==='audit')n.audit=data;
      return n;
    });
  }
  function reconnect(){
    try{clientRef.current?.end(true)}catch(e){}
    setConnected(false);
    if(!cfg.host||!cfg.username||!cfg.password){showToast('critical','Belum lengkap','Isi Host, Username, dan Password HiveMQ.');return}
    const client=mqtt.connect(wsUrl(cfg),{username:cfg.username,password:cfg.password,clientId:'jarvis-web-'+Math.random().toString(16).slice(2),clean:true,reconnectPeriod:3000,connectTimeout:12000});
    clientRef.current=client;
    client.on('connect',()=>{setConnected(true);client.subscribe(topicOf(currentCfg.current,'#'),{qos:0});showToast('ok','HiveMQ connected','Dashboard remote siap dipakai.')});
    client.on('reconnect',()=>setConnected(false));
    client.on('close',()=>setConnected(false));
    client.on('error',err=>{setConnected(false);showToast('critical','MQTT error',String(err?.message||err))});
    client.on('message',onIncoming);
  }
  useEffect(()=>{reconnect();return()=>{try{clientRef.current?.end(true)}catch(e){}}},[]);
  function publishCommand(command,durationMs,confirmText){
    const client=clientRef.current;
    if(!client||!connected){showToast('critical','Belum connected','HiveMQ belum tersambung.');return}
    const body={command,request_id:nowId(command),auth:cfg.cmdAuth||undefined};
    if(durationMs)body.duration_ms=durationMs;
    if(confirmText)body.confirm=confirmText;
    client.publish(topicOf(cfg,'command'),JSON.stringify(body),{qos:0});
    setState(s=>({...s,result:{pending:true,command,request_id:body.request_id,message:'Command dikirim ke HiveMQ'}}));
    showToast('info','Command dikirim',command);
  }
  function sendCommand(command,durationMs){
    if(DANGEROUS.has(command)){
      setModal({command,durationMs});
      return;
    }
    publishCommand(command,durationMs);
  }
  function confirmDanger(){publishCommand(modal.command,modal.durationMs,'YES_I_UNDERSTAND');setModal(null)}
  const nav=['dashboard','control','telemetry','agent','messages','settings'];
  return <div className="app">
    <aside className="side">
      <div className="brand">JARVIS<br/>EMERGENCY</div>
      <div className="subtitle">HIVEMQ CLOUD OUT-OF-BAND CONTROL</div>
      <div className="nav">{nav.map(n=><button key={n} className={tab===n?'active':''} onClick={()=>setTab(n)}>{n.toUpperCase()}</button>)}</div>
      <div className="device"><h3>JARVIS LINK</h3><div className="muted">Host: {cfg.host}<br/>Topic: {cfg.topicPrefix}/#<br/>User: {cfg.username||'-'}<br/>Last: {latestTs?age+' detik lalu':'belum ada'}<br/><span className={online?'ok':'critical'}>{online?'CONNECTED':'OFFLINE'}</span></div></div>
    </aside>
    <main className="main">
      <div className="top"><div><h1>PROFESIONAL SERVIS SERVER CONTROL</h1><div className="muted">Remote control darurat via HiveMQ Cloud. Tidak expose IP ESP32 ke internet.</div></div><div className={'pill '+(online?'':'off')}>{online?'ONLINE':connected?'MQTT CONNECTED':'OFFLINE'}</div></div>
      {tab==='dashboard'&&<section><div className="grid"><Card title="DEVICE" big={latest.device||telemetry.device?.name||'JARVIS'} small={latest.firmware||telemetry.runtime?.firmware||'-'}/><Card title="HEARTBEAT" big={latestTs?age+'s':'NO TS'} small="last seen via HiveMQ"/><Card title="WIFI" big={(latest.rssi??telemetry.wifi?.rssi_dbm??'-')+' dBm'} small={latest.ip||telemetry.wifi?.local_ip||'-'}/><Card title="UPTIME" big={uptimeText(latest.uptime_sec||telemetry.runtime?.uptime_sec)} small="ESP32 runtime"/></div><div className="section-title"><h2>Quick Emergency Actions</h2><span className="muted">Gunakan hati-hati</span></div><div className="actions"><button className="btn cyan" onClick={()=>sendCommand('ping')}>PING JARVIS</button><button className="btn green" onClick={()=>sendCommand('power_on',1000)}>POWER ON</button><button className="btn yellow" onClick={()=>sendCommand('hard_reset',1000)}>HARD RESET</button><button className="btn red" onClick={()=>sendCommand('force_power_off',7000)}>FORCE POWER OFF</button></div><div className="section-title"><h2>Last Result</h2></div><pre className="raw">{state.result?JSON.stringify(state.result,null,2):'Belum ada result.'}</pre></section>}
      {tab==='control'&&<section><div className="card"><h3>Relay & Diagnostic</h3><div className="actions"><button className="btn cyan" onClick={()=>sendCommand('ping')}>PING</button><button className="btn cyan" onClick={()=>sendCommand('test_power_relay')}>TEST POWER RELAY</button><button className="btn cyan" onClick={()=>sendCommand('test_reset_relay')}>TEST RESET RELAY</button><button className="btn cyan" onClick={()=>sendCommand('identify_jarvis')}>BLINK LED</button></div></div><div className="section-title"><h2>Server Service Actions</h2></div><div className="actions"><button className="btn purple" onClick={()=>sendCommand('restart_cloudflared')}>RESTART CLOUDFLARED</button><button className="btn purple" onClick={()=>sendCommand('restart_nginx')}>RESTART NGINX</button><button className="btn purple" onClick={()=>sendCommand('restart_php')}>RESTART PHP</button><button className="btn purple" onClick={()=>sendCommand('restart_mysql')}>RESTART MYSQL</button><button className="btn red" onClick={()=>sendCommand('reboot_server')}>REBOOT SERVER</button><button className="btn red" onClick={()=>sendCommand('power_off')}>POWER OFF SERVER</button><button className="btn yellow" onClick={()=>sendCommand('restart_jarvis')}>RESTART JARVIS</button></div></section>}
      {tab==='telemetry'&&<section><div className="grid"><TelemetryCard telemetry={telemetry}/></div><div className="section-title"><h2>Raw Telemetry</h2></div><pre className="raw">{telemetry?JSON.stringify(telemetry,null,2):'-'}</pre></section>}
      {tab==='agent'&&<section><div className="grid"><Card title="AGENT" big={agent.ok===true?'OK':agent.ok===false?'ERROR':'-'} small={`HTTP ${agent.http_code??'-'} • ${agent.latency_ms??'-'} ms`}/><Card title="CLOUDFLARED" big={svc(agent,'cloudflared')} small="tunnel"/><Card title="NGINX / PHP / MYSQL" big={`N:${svc(agent,'nginx')} P:${svc(agent,'php')} M:${svc(agent,'mysql')}`} small="server stack"/><Card title="AAPANEL" big={svc(agent,'aapanel')} small={agent.status?.aapanel?.port?'Port '+agent.status.aapanel.port:'-'}/></div><div className="section-title"><h2>Raw Agent</h2></div><pre className="raw">{agent?JSON.stringify(agent,null,2):'-'}</pre></section>}
      {tab==='messages'&&<section><div className="section-title"><h2>Live Messages</h2><button className="btn red" onClick={()=>setMessages([])}>CLEAR</button></div><pre className="raw">{messages.map(m=>`[${m.ts}] ${m.topic}\n${m.payload}`).join('\n\n')||'Belum ada pesan.'}</pre></section>}
      {tab==='settings'&&<section><div className="card"><h3>HiveMQ Cloud Settings</h3><div className="form"><Field label="HiveMQ Host" value={cfg.host} onChange={v=>setCfg({...cfg,host:v})}/><Field label="WebSocket Port" value={cfg.port} onChange={v=>setCfg({...cfg,port:v})}/><Field label="WebSocket Path" value={cfg.path} onChange={v=>setCfg({...cfg,path:v})}/><Field label="HiveMQ Username" value={cfg.username} onChange={v=>setCfg({...cfg,username:v})}/><Field label="HiveMQ Password" type="password" value={cfg.password} onChange={v=>setCfg({...cfg,password:v})}/><Field label="Topic Prefix" value={cfg.topicPrefix} onChange={v=>setCfg({...cfg,topicPrefix:v||'jarvis'})}/><Field label="Command Auth" type="password" value={cfg.cmdAuth} onChange={v=>setCfg({...cfg,cmdAuth:v})}/><Field label="Offline setelah detik" type="number" value={cfg.offlineAfter} onChange={v=>setCfg({...cfg,offlineAfter:v})}/></div><p className="muted"><input type="checkbox" checked={!!cfg.remember} onChange={e=>setCfg({...cfg,remember:e.target.checked})}/> Simpan password di browser ini. Jangan aktifkan di komputer umum.</p><div className="section-title"><h2>Topics</h2></div>{['command','result','status','heartbeat','telemetry','agent','alerts','audit'].map(x=><span className="feed-chip" key={x}>{cfg.topicPrefix}/{x}</span>)}<div style={{marginTop:14,display:'flex',gap:10,flexWrap:'wrap'}}><button className="btn green" onClick={saveSettings}>SIMPAN & CONNECT</button><button className="btn cyan" onClick={reconnect}>RECONNECT</button><button className="btn red" onClick={clearSettings}>HAPUS SETTING LOKAL</button></div><p className="muted">UI ini berjalan di GitHub Pages dan connect langsung ke HiveMQ WebSocket <code>{wsUrl(cfg)}</code>. Password tidak ditulis di source code; masukkan manual di browser.</p></div></section>}
    </main>
    {modal&&<div className="modal-bg"><div className="modal"><div className="modal-head">Konfirmasi Command Berbahaya</div><div className="modal-body">Command <code>{modal.command}</code> akan dikirim ke ESP32 Jarvis. Pastikan kamu tahu efeknya ke server fisik.</div><div className="modal-actions"><button className="btn" onClick={()=>setModal(null)}>BATAL</button><button className="btn red" onClick={confirmDanger}>KIRIM DENGAN KONFIRMASI</button></div></div></div>}
    {toast&&<div className="toast"><div className="card"><b className={toast.type}>{toast.title}</b><div className="muted">{toast.msg}</div></div></div>}
  </div>
}
function Card({title,big,small}){return <div className="card"><h3>{title}</h3><div className="big">{big}</div><div className="muted">{small}</div></div>}
function Field({label,value,onChange,type='text'}){return <div className="field"><label>{label}</label><input type={type} value={value??''} onChange={e=>onChange(e.target.value)}/></div>}
function svc(agent,name){const v=agent?.status?.[name]?.online;if(v===true)return 'ON';if(v===false)return 'OFF';return '-'}
function TelemetryCard({telemetry}){const mem=telemetry?.memory||{}, hw=telemetry?.hardware||{}, fl=telemetry?.flash||{}, wf=telemetry?.wifi||{};const hp=Number(mem.heap_used_percent||0);return <><div className="card"><h3>RAM / HEAP</h3><div className="big">{hp?hp.toFixed(1)+'%':'-'}</div><div className="bar"><div style={{width:Math.min(100,hp)+'%'}}></div></div><div className="muted">Used {bytes(mem.heap_used_bytes)} / {bytes(mem.heap_total_bytes)} • Free {bytes(mem.heap_free_bytes)}</div></div><Card title="CHIP" big={hw.chip_model||'-'} small={`Core ${hw.chip_cores||'-'} • ${hw.cpu_freq_mhz||'-'} MHz • SDK ${hw.sdk_version||'-'}`}/><Card title="FLASH" big={bytes(fl.flash_size_bytes)} small={`Speed ${fl.flash_speed_hz||'-'} Hz`}/><Card title="NETWORK" big={wf.status||'-'} small={`SSID ${wf.ssid||'-'} • IP ${wf.local_ip||'-'} • CH ${wf.channel||'-'}`}/></>}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
